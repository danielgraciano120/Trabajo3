<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Petición 4</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#001f3f,#003366,#005580); color:#e0f0ff; margin:0; padding:30px; }
        h1 { color:#7ecfff; border-bottom:2px solid #1a6090; padding-bottom:10px; margin-bottom:20px; }
        h2 { color:#ffdd66; font-size:16px; margin:20px 0 10px; }
        .nav { margin-bottom:20px; }
        .nav a { color:#7ecfff; margin-right:12px; text-decoration:none; border:1px solid #1a6090; padding:5px 12px; border-radius:5px; }
        .nav a:hover { background:#1a6090; }
        .card { background:rgba(0,80,140,0.45); border:1px solid #1a6090; border-radius:10px; padding:20px 25px; margin-bottom:20px; }
        .codigo { background:rgba(0,20,60,0.7); border:1px solid #1a4060; border-radius:6px; padding:12px 16px; font-family:monospace; font-size:13px; color:#88ccff; margin-bottom:15px; }
        ul { list-style:none; padding:0; }
        ul li { padding:11px 14px; border-bottom:1px solid #1a4060; color:#c0e0ff; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
        ul li:last-child { border-bottom:none; }
        .total-badge { background:rgba(0,40,100,0.8); border:1px solid #2a80b0; border-radius:12px; padding:4px 14px; color:#ffdd66; font-weight:bold; font-size:14px; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/">Inicio</a>
    <a href="/peticion1">P1</a><a href="/peticion2">P2</a>
    <a href="/peticion3">P3</a><a href="/peticion4">P4</a><a href="/peticion5">P5</a>
</div>

<h1>⚡ <span th:text="${titulo}"></span></h1>

<div class="card">
    <h2>Definición de la Function&lt;Nadador, Integer&gt;</h2>
    <div class="codigo">
        Function&lt;Nadador, Integer&gt; sumarTiempos = nadador -&gt; {<br>
        &nbsp;&nbsp;int total = 0;<br>
        &nbsp;&nbsp;for (int tiempo : nadador.getTiempos()) {<br>
        &nbsp;&nbsp;&nbsp;&nbsp;total += tiempo;<br>
        &nbsp;&nbsp;}<br>
        &nbsp;&nbsp;return total;<br>
        };
    </div>
</div>

<div class="card">
    <h2>Resultado de aplicar sumarTiempos.apply(nadador) a cada nadador</h2>
    <ul>
        <li th:each="r : ${resultados}">
            <span th:text="${r.split('→')[0]}"></span>
            <span class="total-badge" th:text="'→ ' + ${r.split('→')[1]}"></span>
        </li>
    </ul>
</div>
</body>
</html>
